name: CI/CD Pipeline for Focus Timer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ЭТАП CI: Проверка кода
  code-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run build

  # ЭТАП CD: Сборка и отправка Docker-образа
  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: code-check # Запускается только после успешного CI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Пушим в облако ТОЛЬКО при реальном пуше в main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Логинимся в Docker Hub с помощью сохраненных секретов
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Настраиваем сборщик
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Генерируем правильные теги для контейнера (версию)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/focus-timer
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 4. Собираем и отправляем (push: true) образ в Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}