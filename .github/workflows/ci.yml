name: CI Pipeline for Focus Timer

# 1. Триггеры: когда запускать робота?
on:
  push:
    branches: [ main ] # Запускать при пуше в ветку main
  pull_request:
    branches: [ main ] # Запускать при создании PR в ветку main

# 2. Перечень больших задач (Jobs)
jobs:
  # Задача №1: Проверка качества кода (Линтинг и TypeScript)
  code-check:
    runs-on: ubuntu-latest # Выделяем для робота виртуальную машину на Ubuntu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Шаг 1: Скачиваем твой код из репозитория на виртуалку

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Шаг 2: Разворачиваем Node.js на виртуалке
        with:
          node-version: 20
          cache: 'npm' # Автоматически кэшируем зависимости для ускорения

      - name: Install dependencies
        run: npm ci # Шаг 3: Чистая установка пакетов

      - name: Run TypeScript check
        run: npm run build # Шаг 4: Запускаем сборку (включая tsc), чтобы поймать ошибки типов

  # Задача №2: Сборка Docker-образа (начнется только ЕСЛИ первая задача прошла успешно)
  docker-build:
    runs-on: ubuntu-latest
    needs: code-check # Говорим: "Не собирай докер, если код упал на проверке типов!"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3 # Настраиваем продвинутый сборщик Docker

      - name: Build Docker Image
        uses: docker/build-push-action@v5 # Собираем наш Dockerfile
        with:
          context: .
          file: ./Dockerfile
          push: false # На этапе CI мы просто тестируем сборку, никуда её пока не отправляем